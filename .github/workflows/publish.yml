name: Publish to pub.dev

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.0) — for reference only, must match pubspec.yaml"
        required: true

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: "v${{ inputs.version }}"

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Test
        run: dart test

      - name: Dry run
        run: dart pub publish --dry-run

      - name: Publish
        run: dart pub publish -f
