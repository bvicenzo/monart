name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        sdk:
          - "3.1.0"
          - stable
          - beta

    steps:
      - uses: actions/checkout@v6

      - name: Set up Dart ${{ matrix.sdk }}
        uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.sdk }}

      - name: Install dependencies
        run: dart pub get

      - name: Analyze
        run: dart analyze --fatal-infos
        continue-on-error: ${{ matrix.sdk != 'stable' }}

      - name: Test
        run: dart test
        continue-on-error: ${{ matrix.sdk == 'beta' }}
